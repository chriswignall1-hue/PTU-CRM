<!DOCTYPE html>
<html lang="en">
<head>
<script>
  (function () {
    if (sessionStorage.getItem('ptu_crm_auth') !== 'granted') {
      window.location.replace('login.html');
    }
  })();

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pure Transfer University — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:#0a1628;color:#fff;min-height:100vh;}
:root{--navy:#0a1628;--cyan:#00b4d8;--yellow:#ffd60a;}
.header{background:#0a1628;border-bottom:2px solid var(--cyan);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:36px;height:36px;background:var(--cyan);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#0a1628;}
.logo-text{font-size:16px;font-weight:600;color:#fff;}
.logo-sub{font-size:11px;color:var(--cyan);font-weight:400;}
.header-right{display:flex;align-items:center;gap:12px;}
#sync-status{font-size:11px;color:rgba(255,255,255,0.35);}
.body{padding:20px 24px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:rgba(255,255,255,0.06);border:0.5px solid rgba(0,180,216,0.25);border-radius:10px;padding:12px 16px;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:600;}
.stat-value.cyan{color:var(--cyan);}
.stat-value.yellow{color:var(--yellow);}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap input{width:100%;background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px 10px 38px;font-size:13px;color:#fff;font-family:'Poppins',sans-serif;outline:none;}
.search-wrap input::placeholder{color:rgba(255,255,255,0.3);}
.search-wrap input:focus{border-color:var(--cyan);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none;}
select{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px;font-size:13px;color:#fff;font-family:'Poppins',sans-serif;outline:none;cursor:pointer;}
select:focus{border-color:var(--cyan);}
select option{background:#0f2035;color:#fff;}
.btn{padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Poppins',sans-serif;border:none;}
.btn-cyan{background:var(--cyan);color:#0a1628;}
.btn-cyan:hover{opacity:0.85;}
.btn-ghost{background:rgba(255,255,255,0.08);color:#fff;border:0.5px solid rgba(255,255,255,0.2);}
.btn-ghost:hover{background:rgba(255,255,255,0.14);}
.table-wrap{background:rgba(255,255,255,0.03);border:0.5px solid rgba(255,255,255,0.1);border-radius:12px;overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px;}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:500;color:rgba(255,255,255,0.4);border-bottom:0.5px solid rgba(255,255,255,0.08);background:rgba(0,0,0,0.2);white-space:nowrap;}
td{padding:10px 14px;border-bottom:0.5px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.85);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,180,216,0.05);}
tr.overdue td{background:rgba(231,76,60,0.05);}
tr.due-today td{background:rgba(255,214,10,0.05);}
tr.due-soon td{background:rgba(0,180,216,0.05);}
.name-cell{display:flex;align-items:center;gap:8px;}
.av{width:28px;height:28px;border-radius:50%;background:var(--cyan);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0a1628;flex-shrink:0;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-warm{background:rgba(255,214,10,0.15);color:var(--yellow);}
.badge-cold{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.45);}
.badge-call{background:rgba(0,180,216,0.15);color:var(--cyan);}
.badge-none{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.25);}
.badge-yes{background:rgba(0,200,100,0.15);color:#00c864;}
.badge-no{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.25);}
.badge-overdue{background:rgba(231,76,60,0.2);color:#e74c3c;}
.badge-today{background:rgba(255,214,10,0.2);color:var(--yellow);}
.badge-soon{background:rgba(0,180,216,0.15);color:var(--cyan);}
.badge-upcoming{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);}
.sheet-pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(0,180,216,0.1);color:var(--cyan);border:0.5px solid rgba(0,180,216,0.3);white-space:nowrap;}
.notes-cell{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;color:rgba(255,255,255,0.5);font-style:italic;}
.actions{display:flex;gap:6px;}
.act-btn{background:none;border:0.5px solid rgba(255,255,255,0.15);border-radius:5px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,0.55);cursor:pointer;font-family:'Poppins',sans-serif;white-space:nowrap;}
.act-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.act-btn.del:hover{border-color:#e74c3c;color:#e74c3c;}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 0 4px;font-size:12px;color:rgba(255,255,255,0.35);}
.page-btns{display:flex;gap:6px;}
.page-btn{background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 12px;font-size:12px;color:#fff;cursor:pointer;font-family:'Poppins',sans-serif;}
.page-btn:hover{border-color:var(--cyan);}
.page-btn.active{background:var(--cyan);color:#0a1628;border-color:var(--cyan);font-weight:600;}
.loading{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.4);font-size:14px;}
.spinner{width:28px;height:28px;border:2px solid rgba(0,180,216,0.2);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:rgba(231,76,60,0.1);border:0.5px solid rgba(231,76,60,0.3);border-radius:8px;padding:14px 16px;font-size:13px;color:#e74c3c;margin-bottom:16px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:#0f2035;border:0.5px solid rgba(0,180,216,0.3);border-radius:14px;padding:24px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:16px;font-weight:600;margin-bottom:18px;}
.field{margin-bottom:13px;}
.field label{font-size:11px;color:rgba(255,255,255,0.4);display:block;margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px;font-size:13px;color:#fff;font-family:'Poppins',sans-serif;outline:none;}
.field input[type="date"]{color-scheme:dark;}
.field textarea{resize:vertical;min-height:80px;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--cyan);}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,0.2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-err{background:rgba(231,76,60,0.1);border:0.5px solid rgba(231,76,60,0.3);border-radius:7px;padding:10px 12px;font-size:12px;color:#e74c3c;margin-bottom:12px;display:none;}
.li-link{color:var(--cyan);font-size:12px;text-decoration:none;}
.li-link:hover{text-decoration:underline;}
.empty{text-align:center;padding:40px;color:rgba(255,255,255,0.25);font-size:13px;}
.reminders-banner{background:rgba(231,76,60,0.1);border:0.5px solid rgba(231,76,60,0.3);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;
